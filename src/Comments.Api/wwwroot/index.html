<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коментарі SPA</title>
  <link rel="stylesheet" href="/styles.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <main class="container">
    <h1>SPA «Коментарі»</h1>

    <section class="panel">
      <h2>Створити коментар</h2>
      <form id="comment-form" class="form-grid">
        <label>Імʼя <input required name="userName" maxlength="100" /></label>
        <label>Email <input required type="email" name="email" maxlength="200" /></label>
        <label>Домашня сторінка <input type="url" name="homePage" placeholder="https://example.com" /></label>
        <div class="captcha-block">
          <span>Captcha (введіть результат):</span>
          <div class="captcha-row">
            <img id="captcha-image" alt="captcha" class="captcha-image" />
            <button id="reload-captcha" type="button" class="secondary-button">Оновити captcha</button>
          </div>
          <input name="captchaAnswer" placeholder="наприклад, 7" />
          <input type="hidden" name="captchaChallengeId" />
        </div>
        <label class="wide">Parent comment ID <input id="parent-id" name="parentId" placeholder="опціонально" /></label>
        <div id="reply-context" class="reply-context hidden" aria-live="polite">
          <span id="reply-context-text"></span>
          <button id="clear-reply-context" type="button" class="secondary-button">Скасувати відповідь</button>
        </div>
        <label class="wide">Текст
          <textarea required name="text" rows="4" maxlength="5000"></textarea>
        </label>
        <div class="wide text-toolbar" role="group" aria-label="Швидкі теги форматування">
          <span class="text-toolbar-label">Швидкі теги:</span>
          <button type="button" class="secondary-button quick-tag-btn" data-tag="i">[i]</button>
          <button type="button" class="secondary-button quick-tag-btn" data-tag="strong">[strong]</button>
          <button type="button" class="secondary-button quick-tag-btn" data-tag="code">[code]</button>
          <button type="button" class="secondary-button quick-tag-btn" data-tag="a">[a]</button>
        </div>
        <div id="text-preview" class="text-content-preview wide" aria-live="polite">
          <div class="text-preview-title">Preview повідомлення</div>
          <div id="text-preview-content" class="text-preview-content">Попередній перегляд зʼявиться тут…</div>
        </div>
        <label class="wide">Вкладення (TXT ≤ 100KB, PNG/JPG/GIF ≤ 1MB; великі зображення авто-resize до 320x240)
          <input id="attachment" type="file" name="attachment" accept=".txt,image/png,image/jpeg,image/gif,text/plain" />
        </label>
        <div id="attachment-preview" class="attachment-preview"></div>
        <button type="submit">Опублікувати</button>
      </form>
      <p id="form-status" class="status"></p>
    </section>

    <section class="panel">
      <div class="toolbar">
        <h2>Список коментарів</h2>
        <input id="search" placeholder="Пошук (потрібен Elasticsearch)" />
        <select id="apiMode">
          <option value="rest" selected>REST API</option>
          <option value="graphql">GraphQL</option>
        </select>
        <select id="sortBy">
          <option value="CreatedAtUtc">Дата</option>
          <option value="UserName">Імʼя</option>
          <option value="Email">Email</option>
        </select>
        <select id="sortDirection">
          <option value="Desc">Спочатку нові</option>
          <option value="Asc">Спочатку старі</option>
        </select>
        <select id="pageSize">
          <option value="10">10 / стор.</option>
          <option value="25" selected>25 / стор.</option>
          <option value="50">50 / стор.</option>
          <option value="100">100 / стор.</option>
        </select>
        <button id="reload">Оновити</button>
        <button id="expand-all" type="button" class="secondary-button">Розгорнути всі</button>
        <button id="collapse-all" type="button" class="secondary-button">Згорнути всі</button>
      </div>
      <div class="pagination" id="pagination-controls">
        <button id="prev-page" type="button">← Попередня</button>
        <span id="page-info">Сторінка 1</span>
        <button id="next-page" type="button">Наступна →</button>
      </div>
      <div id="comments"></div>
    </section>
  </main>

  <dialog id="attachment-lightbox" class="lightbox" aria-label="Перегляд вкладення">
    <button id="lightbox-close" type="button" class="lightbox-close" aria-label="Закрити перегляд">×</button>
    <img id="lightbox-image" class="lightbox-image" alt="Збільшене вкладення" />
  </dialog>
</body>
</html>
